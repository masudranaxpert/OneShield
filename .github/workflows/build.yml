name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/OneShield.apk

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OneShield ${{ steps.version.outputs.version }}"
          body: |
            ## 🔐 OneShield ${{ steps.version.outputs.version }}

            ### Download
            Download `OneShield.apk` below and install on your Android device.

            ### Install
            If Play Protect shows a warning, tap **"More details"** → **"Install anyway"**

            ### What's New
            - See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.version }}) for changes
          files: build/app/outputs/flutter-apk/OneShield.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
