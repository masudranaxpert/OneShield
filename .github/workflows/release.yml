name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # Build Android APK
  # ─────────────────────────────────────────
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk OneShield-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: OneShield-${{ github.ref_name }}.apk

  # ─────────────────────────────────────────
  # Build Windows Installer EXE
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="${{ steps.version.outputs.version }}" "installer\oneshield_setup.iss"

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/OneShield-Windows-${{ steps.version.outputs.version }}.exe

  # ─────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-apk, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release-assets

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OneShield ${{ github.ref_name }}
          body: |
            ## 🛡️ OneShield ${{ github.ref_name }}

            ### Downloads
            | Platform | File | How to Install |
            |----------|------|----------------|
            | 📱 Android | `OneShield-${{ github.ref_name }}.apk` | Download → Install → Allow if prompted |
            | 🖥️ Windows | `OneShield-Windows-${{ github.ref_name }}.exe` | Download → Run Setup → Done! |

            ### What's New
            - Real-time Google Drive sync across devices
            - Deletion tracking (delete on one device, syncs to all)
            - Background polling every 30 seconds
            - Windows: Lock on Minimize toggle in Settings
            - Windows: Custom app icon, floating notifications
            - Faster sync (2s upload debounce)
          files: |
            ./release-assets/*
          draft: false
          prerelease: false
